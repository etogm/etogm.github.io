<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0-beta3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-eOJMYsd53ii+scO/bJGFsiCZc+5NDVN2yr8+0RDqr0Ql0h+rP48ckxlpbzKgwra6"
      crossorigin="anonymous"
    />
    <title>Document</title>
  </head>
  <body class="bg-light">
    <div class="container-fluid">
      <nav class="navbar navbar-expand-lg navbar-light bg-light">
        <div class="container-fluid">
          <a class="navbar-brand" href="index.html">Успеваемость</a>
          <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav">
              <li class="nav-item">
                <a class="nav-link active" href="add.html">Добавить</a>
              </li>
              <li class="nav-item">
                <a class="nav-link" href="view.html">Просмотреть</a>
              </li>
              <li class="nav-item">
                <a class="nav-link" href="find.html">Выборка</a>
              </li>
            </ul>
          </div>
        </div>
      </nav>
      <main>
        <h3>Добавить студента</h3>
        <form action="#" method="post">
          <div class="input-group mb-3">
            <label class="input-group-text inputGroup-sizing-sm" for="lastname"
              >Фамилия</label
            >
            <input
              class="form-control"
              type="text"
              name="lastname"
              id="lastname"
              required
            />
          </div>
          <div class="input-group mb-3">
            <label class="input-group-text inputGroup-sizing-sm" for="firstname"
              >Имя</label
            >
            <input
              class="form-control"
              type="text"
              name="firstname"
              id="firstname"
              required
            />
          </div>
          <div class="input-group mb-3">
            <label
              class="input-group-text inputGroup-sizing-sm"
              for="secondname"
              >Отчество</label
            >
            <input
              class="form-control"
              type="text"
              name="secondname"
              id="secondname"
              required
            />
          </div>
          <div class="input-group mb-3">
            <label class="input-group-text inputGroup-sizing-sm" for="group"
              >Номер группы</label
            >
            <input
              class="form-control"
              type="number"
              name="group"
              id="group"
              required
            />
          </div>
          <div class="d-grid gap-2 col-6 mx-auto">
            <input
              class="btn btn-primary"
              type="submit"
              name="save"
              id="save"
              value="Сохранить"
            />
          </div>
        </form>
        <div id="error"></div>
      </main>
    </div>
    <script src="js/addscript.js"></script>
  </body>
</html>
