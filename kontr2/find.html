<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0-beta3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-eOJMYsd53ii+scO/bJGFsiCZc+5NDVN2yr8+0RDqr0Ql0h+rP48ckxlpbzKgwra6"
      crossorigin="anonymous"
    />
    <title>Document</title>
  </head>
  <body class="bg-light">
    <div class="container-fluid">
      <nav class="navbar navbar-expand-lg navbar-light bg-light">
        <div class="container-fluid">
          <a class="navbar-brand" href="index.html">Успеваемость</a>
          <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav">
              <li class="nav-item">
                <a class="nav-link" href="add.html">Добавить</a>
              </li>
              <li class="nav-item">
                <a class="nav-link" href="view.html">Просмотреть</a>
              </li>
              <li class="nav-item">
                <a class="nav-link active" href="find.html">Выборка</a>
              </li>
            </ul>
          </div>
        </div>
      </nav>
      <main>
        <h3>Просмотр всех студентов</h3>
        <div class="input-group mb-3">
          <label class="input-group-text inputGroup-sizing-sm" for="fullname"
            >Фамилия Имя Отчество Группа</label
          >
          <input
            class="form-control"
            type="search"
            name="fullname"
            id="fullname"
          />
        </div>

        <div class="input-group mb-3">
          <label class="input-group-text inputGroup-sizing-sm" for="subject"
            >Поиск по предмету</label
          >
          <input
            class="form-control"
            type="search"
            name="subject"
            id="subject"
          />
        </div>
        <table class="table">
          <thead>
            <tr>
              <th scope="col">#</th>
              <th scope="col">Фамилия</th>
              <th scope="col">Имя</th>
              <th scope="col">Отчество</th>
              <th scope="col">Номер группы</th>
              <th scope="col">Оценки</th>
            </tr>
          </thead>
          <tbody id="student-list"></tbody>
        </table>
      </main>
    </div>
    <script src="js/students.js"></script>
    <script src="js/findscript.js"></script>
  </body>
</html>
